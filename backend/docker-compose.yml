services:
  db:
    image: postgres:16
    container_name: memoryjournal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: memoryjournal
      POSTGRES_PASSWORD: memoryjournal_dev
      POSTGRES_DB: memoryjournal
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
